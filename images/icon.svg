<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <!-- Shield Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <!-- Clock Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Shield shape in the background of the clock or surrounding it -->
  <path d="M256 40 C170 80 120 120 120 220 C120 340 210 420 256 460 C302 420 392 340 392 220 C392 120 342 80 256 40 Z" 
        fill="none" stroke="url(#shieldGrad)" stroke-width="16" stroke-linejoin="round" />

  <!-- Inner Clock Body -->
  <circle cx="256" cy="240" r="110" fill="#1e293b" stroke="#ffffff" stroke-width="10" filter="url(#glow)" />

  <!-- Clock Dial Ticks -->
  <circle cx="256" cy="145" r="5" fill="#38bdf8" />
  <circle cx="351" cy="240" r="5" fill="#38bdf8" />
  <circle cx="256" cy="335" r="5" fill="#38bdf8" />
  <circle cx="161" cy="240" r="5" fill="#38bdf8" />

  <!-- Clock Hands -->
  <!-- Hour hand pointing to 10 -->
  <line x1="256" y1="240" x2="200" y2="200" stroke="#ffffff" stroke-width="10" stroke-linecap="round" />
  <!-- Minute hand pointing to 2 -->
  <line x1="256" y1="240" x2="310" y2="190" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" />

  <!-- Center cap of hands -->
  <circle cx="256" cy="240" r="12" fill="#ffffff" />
  <circle cx="256" cy="240" r="6" fill="#0284c7" />

  <!-- Lock Icon to represent security at the bottom overlap -->
  <rect x="231" y="380" width="50" height="40" rx="8" fill="#38bdf8" />
  <path d="M241 380 V365 C241 355 249 350 256 350 C263 350 271 355 271 365 V380" 
        fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
</svg>
